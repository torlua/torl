<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>tor</title>

<!-- OpenGraph -->
<meta property="og:title" content="tor." />
<meta property="og:description" content="OWNER/CEO • hey there! im tor, aka t. i made this." />
<meta property="og:image" content="https://i.pinimg.com/736x/28/35/24/2835246d8785514767b63ad819905e40.jpg" />
<meta property="og:url" content="https://torr.baby" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#000;
--text:#e6e6e6;
--muted:#bdbdbd;
--accent:#ffffff;
--border:#333;
--card:#000;
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:Poppins,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:url('https://i.pinimg.com/736x/3b/32/e8/3b32e8fe3e7ba9f1ded72b83e9620f74.jpg'),auto;
}

/* Background video */

#bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.35);
z-index:-2;
}

/* vignette */

#vignette{
position:fixed;
inset:0;
background:radial-gradient(circle,transparent 40%,rgba(0,0,0,.9) 100%);
pointer-events:none;
z-index:-1;
}

/* Start screen */

#start{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
font-weight:700;
letter-spacing:6px;
cursor:pointer;
z-index:999;
transition:opacity .5s ease;
}

#start.hidden{
opacity:0;
pointer-events:none;
}

/* Card */

.card{
background:var(--card);
border-radius:var(--radius);
padding:40px 46px;
max-width:360px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.7);
backdrop-filter:blur(6px);
}

/* Avatar */

.avatar-wrap{
position:relative;
margin-bottom:22px;
}

.avatar{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--border);
}

/* Online status */

.status{
position:absolute;
bottom:6px;
right:6px;
width:22px;
height:22px;
background:#4caf50;
border-radius:50%;
border:2px solid black;
}

/* Name */

.name{
font-size:26px;
font-weight:600;
letter-spacing:.04em;
}

.role{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

/* Badges */

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin:18px 0 22px;
}

.badge{
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
position:relative;
transition:.25s;
}

.badge img{
width:20px;
height:20px;
filter:brightness(0) invert(1);
}

.badge:hover{
transform:scale(1.15);
}

/* Tooltip */

.badge:hover::after{
content:attr(data-label);
position:absolute;
bottom:140%;
background:#222;
padding:4px 9px;
border-radius:5px;
font-size:12px;
white-space:nowrap;
}

/* Bio */

.bio{
font-size:14px;
color:var(--muted);
margin-bottom:24px;
line-height:1.4;
}

/* Social links */

.links{
display:flex;
justify-content:center;
gap:18px;
}

.links a{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
transition:.25s;
}

.links img{
width:20px;
height:20px;
filter:brightness(0) invert(1);
}

.links a:hover{
transform:scale(1.2);
}

/* Volume */

.volume{
position:fixed;
bottom:22px;
right:22px;
display:flex;
align-items:center;
gap:10px;
background:rgba(0,0,0,.6);
padding:8px 12px;
border-radius:10px;
border:1px solid var(--border);
backdrop-filter:blur(6px);
}

.volume input{
width:90px;
}

</style>
</head>

<body>

<div id="start">t</div>

<video id="bg-video" autoplay muted loop playsinline>
<source src="background.mp4" type="video/mp4">
</video>

<audio id="music" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<div id="vignette"></div>

<main class="card">

<div class="avatar-wrap">
<img class="avatar" src="https://i.pinimg.com/736x/28/35/24/2835246d8785514767b63ad819905e40.jpg">
<div class="status"></div>
</div>

<h1 class="name">tor</h1>
<div class="role">OWNER / CEO</div>

<div class="badges">

<div class="badge" data-label="CEO">
<img src="ceo.png">
</div>

<div class="badge" data-label="Booster">
<img src="mission.png">
</div>

<div class="badge" data-label="Premium">
<img src="crown.png">
</div>

<div class="badge" data-label="Donator">
<img src="Ipo5WaB.png">
</div>

<div class="badge" data-label="Bug Hunter">
<img src="NxFGjVx.png">
</div>

<div class="badge" data-label="Administrator">
<img src="zWXn6xL.png">
</div>

<div class="badge" data-label="All Badges">
<img src="crystal.png">
</div>

</div>

<p class="bio">
hey there! im tor, aka t. i made this. my team and i are working on a portal so you can have your very own.
</p>

<nav class="links">

<a href="https://discord.gg/C7CnSMrsmG">
<img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png">
</a>

<a href="https://x.com/torluaa">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png">
</a>

<a href="https://github.com/torlua">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111432.png">
</a>

</nav>

</main>

<div class="volume">
<label>Volume</label>
<input type="range" min="0" max="1" step="0.01" value="0.5" id="vol">
</div>

<script>

/* start screen */

const start = document.getElementById("start")
const music = document.getElementById("music")

start.onclick = () =>{
start.classList.add("hidden")

music.volume=.5
music.play().catch(()=>{})

setTimeout(()=>start.remove(),500)
}

/* volume */

document.getElementById("vol").oninput = e=>{
music.volume = e.target.value
}

/* animated title */

const text="T O R R . B A B Y / T "
let i=0
let forward=true

function animateTitle(){

document.title=text.slice(0,i)

if(forward){
i++
if(i>=text.length){
forward=false
setTimeout(animateTitle,900)
return
}
}else{
i--
if(i<=0) forward=true
}

setTimeout(animateTitle,150)

}

animateTitle()

</script>

</body>
</html>
